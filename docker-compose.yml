services:
  db:
    image: postgres:16
    container_name: softsolutions_db
    restart: always
    environment:
      POSTGRES_DB: dev_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dev_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  meilisearch:
    image: getmeili/meilisearch:v1.15
    container_name: softsolutions_meilisearch
    restart: always
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: "softsolutions_master_key_2026"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  api:
    build:
      context: .
    container_name: softsolutions_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/dev_db?sslmode=disable
      MEILI_HOST: http://meilisearch:7700
      MEILI_API_KEY: softsolutions_master_key_2026
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  bootstrap:
    build:
      context: .
    container_name: softsolutions_bootstrap
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/dev_db?sslmode=disable
      MEILI_HOST: http://meilisearch:7700
      MEILI_API_KEY: softsolutions_master_key_2026
      API_URL: http://api:4000
      NODE_ENV: production
    command: ["sh", "./scripts/bootstrap.sh"]
    restart: "no"

volumes:
  pg_data:
  meili_data: